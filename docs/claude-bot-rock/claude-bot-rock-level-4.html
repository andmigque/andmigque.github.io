<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Claude Bot Rock — Level 4</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{ --navy:#0D1330; --ink:#070A1C; --cream:#FAF6EE; --coral:#D97757;
         --red:#FF2424; --go:#4D7EF5; --gem:#4285F4; }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:radial-gradient(ellipse at 50% 0%, #131B46 0%, #0D1330 50%, #070A1C 100%);
    font-family:'Press Start 2P', monospace; color:var(--cream);
    display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
    min-height:100%; padding:14px 10px 26px; gap:10px;
    -webkit-tap-highlight-color:transparent; overflow-x:hidden;
  }
  .titlebar{text-align:center; line-height:1.5; user-select:none;}
  .titlebar .big{ font-size:15px; color:var(--coral);
    text-shadow:2px 2px 0 #5a2418, 0 0 16px rgba(217,119,87,.5); letter-spacing:1px; }
  .titlebar .sub{font-size:7px; color:var(--go); margin-top:7px; opacity:.9;}
  #stage{ position:relative; width:100%; max-width:472px; padding:7px; border-radius:6px;
    background:linear-gradient(160deg,#1a2150,#0c1028);
    box-shadow:0 0 0 2px #04050c, 0 10px 28px rgba(0,0,0,.6), inset 0 0 0 1px rgba(255,255,255,.05); }
  canvas{ display:block; width:100%; height:auto; image-rendering:pixelated;
    image-rendering:crisp-edges; border-radius:3px; background:#0D1330; }
  .crt{ position:absolute; inset:7px; border-radius:3px; pointer-events:none;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,.15) 0 2px, rgba(0,0,0,0) 2px 4px),
      radial-gradient(ellipse at 50% 50%, rgba(0,0,0,0) 55%, rgba(0,0,0,.45) 100%);
    mix-blend-mode:multiply; }
  #controls{ width:100%; max-width:472px; display:flex; align-items:center;
    justify-content:space-between; gap:10px; user-select:none; }
  .cluster{display:flex; gap:8px;}
  button.pad{ font-family:inherit; font-size:16px; color:var(--cream); width:58px; height:48px;
    border:none; border-radius:7px; background:linear-gradient(180deg,#2c3a72,#1a2148);
    box-shadow:0 4px 0 #0c1028, inset 0 1px 0 rgba(255,255,255,.14);
    touch-action:none; cursor:pointer; transition:transform .04s, box-shadow .04s; }
  button.pad:active, button.pad.on{ transform:translateY(3px);
    box-shadow:0 1px 0 #0c1028, inset 0 1px 0 rgba(255,255,255,.14);
    background:linear-gradient(180deg,#3a4d94,#222c60); }
  button.pad.drop{background:linear-gradient(180deg,#3a5ad0,#28409a);}
  .small{display:flex; flex-direction:column; gap:7px; align-items:center;}
  button.mini{ font-family:inherit; font-size:6px; color:var(--cream); padding:7px 8px;
    border:none; border-radius:5px; cursor:pointer; background:#1a2148; box-shadow:0 3px 0 #0c1028;
    touch-action:none; letter-spacing:.5px; }
  button.mini:active{transform:translateY(2px); box-shadow:0 1px 0 #0c1028;}
  .hint{font-size:6px; color:#6b72a0; text-align:center; line-height:1.7; max-width:472px; margin-top:2px;}
</style>
</head>
<body>

<div class="titlebar">
  <div class="big">CLAUDE&nbsp;BOT&nbsp;ROCK</div>
  <div class="sub">LEVEL 4 — THE CHURN</div>
</div>

<div id="stage">
  <canvas id="cv" width="480" height="360"></canvas>
  <div class="crt"></div>
</div>

<div id="controls">
  <div class="cluster" aria-label="move">
    <button class="pad" data-k="l">&#9664;</button>
    <button class="pad" data-k="r">&#9654;</button>
  </div>
  <div class="small">
    <button class="mini" id="muteBtn">SOUND&nbsp;ON</button>
    <button class="mini" id="resetBtn">RESET</button>
  </div>
  <div class="cluster" aria-label="drop">
    <button class="pad drop" data-k="d">&#9660;</button>
  </div>
</div>

<div class="hint">
  RIDE THE BLOCKS DOWN &middot; &#9660; DROP THROUGH &middot; DODGE THE LASER &amp; THE WIG &middot; REACH THE GEMINI<br>
  KEYS: ARROWS / WASD &nbsp;&middot;&nbsp; M MUTE &nbsp;&middot;&nbsp; R RESET
</div>

<script>
"use strict";
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const W=480,H=360;

/* INPUT */
const input={l:0,r:0,u:0,d:0};
const KEYMAP={ArrowLeft:'l',KeyA:'l',ArrowRight:'r',KeyD:'r',ArrowUp:'u',KeyW:'u',ArrowDown:'d',KeyS:'d'};
addEventListener('keydown',e=>{ if(KEYMAP[e.code]){input[KEYMAP[e.code]]=1;e.preventDefault();}
  if(e.code==='KeyM')Audio.toggleMute(); if(e.code==='KeyR')resetGame();
  if(e.code==='Space'||e.code==='Enter'){tapAction();e.preventDefault();}
  Audio.ensure(); if(state==='title'&&KEYMAP[e.code])startGame(); });
addEventListener('keyup',e=>{ if(KEYMAP[e.code])input[KEYMAP[e.code]]=0; });
document.querySelectorAll('button.pad').forEach(b=>{ const k=b.dataset.k;
  const dn=e=>{e.preventDefault();input[k]=1;b.classList.add('on');Audio.ensure();if(state==='title')startGame();};
  const up=e=>{if(e)e.preventDefault();input[k]=0;b.classList.remove('on');};
  b.addEventListener('pointerdown',dn);b.addEventListener('pointerup',up);
  b.addEventListener('pointerleave',up);b.addEventListener('pointercancel',up); });
document.getElementById('muteBtn').addEventListener('click',()=>{Audio.ensure();Audio.toggleMute();});
document.getElementById('resetBtn').addEventListener('click',()=>{Audio.ensure();resetGame();});
cv.addEventListener('pointerdown',e=>{e.preventDefault();Audio.ensure();tapAction();});
function tapAction(){ if(state==='title')startGame(); else if(state==='win')resetGame(); }

/* AUDIO */
const Audio=(function(){
  let ctxA=null,master=null,musicG=null,sfxG=null,muted=false,pulseOn=false,nextPulse=0,tog=false;
  function ensure(){ if(ctxA){if(ctxA.state==='suspended')ctxA.resume();return;}
    const AC=window.AudioContext||window.webkitAudioContext; if(!AC)return; ctxA=new AC();
    master=ctxA.createGain();master.gain.value=0.9;master.connect(ctxA.destination);
    musicG=ctxA.createGain();musicG.gain.value=0.5;musicG.connect(master);
    sfxG=ctxA.createGain();sfxG.gain.value=0.9;sfxG.connect(master); }
  function note(t,f,d,ty,v,tg){ if(!f||!ctxA)return; const o=ctxA.createOscillator(),g=ctxA.createGain();
    o.type=ty;o.frequency.setValueAtTime(f,t); g.gain.setValueAtTime(0.0001,t);
    g.gain.linearRampToValueAtTime(v,t+0.012); g.gain.exponentialRampToValueAtTime(0.0006,t+d);
    o.connect(g);g.connect(tg||sfxG);o.start(t);o.stop(t+d+0.03); }
  function noise(d,v,fq){ if(!ctxA)return; const n=Math.floor(ctxA.sampleRate*d);
    const buf=ctxA.createBuffer(1,n,ctxA.sampleRate);const dd=buf.getChannelData(0);
    for(let i=0;i<n;i++)dd[i]=(Math.random()*2-1)*(1-i/n);
    const s=ctxA.createBufferSource();s.buffer=buf;const g=ctxA.createGain();g.gain.value=v;
    const lp=ctxA.createBiquadFilter();lp.type='lowpass';lp.frequency.value=fq||900;
    s.connect(lp);lp.connect(g);g.connect(sfxG);s.start(); }
  function step(){if(ctxA)note(ctxA.currentTime,90+Math.random()*20,0.05,'square',0.045);}
  function charge(){if(ctxA){note(ctxA.currentTime,300,0.3,'sawtooth',0.05);}}
  function zap(){if(ctxA){note(ctxA.currentTime,1200,0.12,'sawtooth',0.12);noise(0.18,0.14,3000);}}
  function boop(){ if(!ctxA)return; const o=ctxA.createOscillator(),g=ctxA.createGain(),t=ctxA.currentTime;
    o.type='square';o.frequency.setValueAtTime(240,t);o.frequency.exponentialRampToValueAtTime(48,t+0.42);
    g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.45);
    o.connect(g);g.connect(sfxG);o.start(t);o.stop(t+0.48); noise(0.2,0.16); }
  function get(){ if(!ctxA)return; const t=ctxA.currentTime;
    [523.25,659.25,783.99,1046.5].forEach((f,i)=>note(t+i*0.07,f,0.16,'square',0.13));
    note(t+0.3,1318.5,0.4,'triangle',0.12); }
  function win(){ if(!ctxA)return; const t=ctxA.currentTime;
    [523.25,523.25,523.25,659.25,587.33,659.25,783.99].forEach((f,i)=>note(t+i*0.14,f,0.16,'square',0.13));
    note(t+0.98,1046.5,0.6,'square',0.13); }
  function startMusic(){if(!ctxA)return;pulseOn=true;nextPulse=ctxA.currentTime+0.1;}
  function tick(){ if(pulseOn&&ctxA){ while(nextPulse<ctxA.currentTime+0.3){
    note(nextPulse,tog?98:73.42,0.16,'square',0.06,musicG); tog=!tog; nextPulse+=0.42; } } }
  function toggleMute(){muted=!muted;if(master)master.gain.value=muted?0:0.9;
    document.getElementById('muteBtn').textContent=muted?'SOUND OFF':'SOUND ON';}
  return {ensure,tick,startMusic,toggleMute,step,charge,zap,boop,get,win};
})();

/* LEVEL */
const SPAWN={x:24,y:46};
const bars=[ {x:8,y:72,w:150,h:12}, {x:300,y:72,w:168,h:12} ];   // one-way entry ledges
const floor_={x:0,y:336,w:480,h:24};
const gem={x:228,y:312,w:24,h:24};

// ===== crank this for MORE BLOCKS =====
const BLOCK_COUNT = 60;
// procedural churn: scatter blocks on a jittered grid across the play field,
// each gets a random axis, direction, speed and patrol range. Deterministic per reset.
let rngSeed = 1337;
function rng(){ rngSeed=(rngSeed*1103515245+12345)&0x7fffffff; return rngSeed/0x7fffffff; }
function makeMovers(){
  rngSeed=1337;
  const out=[];
  const COLW=46, ROWH=34;                  // cell spacing
  const x0=20, x1=452, y0=108, y1=312;
  const cols=Math.floor((x1-x0)/COLW), rows=Math.floor((y1-y0)/ROWH);
  // build candidate cells, shuffle, take BLOCK_COUNT
  const cells=[];
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) cells.push({c,r});
  for(let i=cells.length-1;i>0;i--){ const j=Math.floor(rng()*(i+1)); [cells[i],cells[j]]=[cells[j],cells[i]]; }
  const n=Math.min(BLOCK_COUNT,cells.length);
  for(let i=0;i<n;i++){
    const {c,r}=cells[i];
    const bx=x0+c*COLW+rng()*16;
    const by=y0+r*ROWH+rng()*12;
    const vert=rng()<0.32;
    const sp=1.2+rng()*1.1;
    if(vert){
      const span=40+rng()*70, top=Math.max(108,by-span/2);
      out.push({x:bx,y:by,axis:'v',dir:rng()<.5?1:-1,sp,min:top,max:Math.min(312,top+span+24),w:24,h:24,dx:0,dy:0});
    } else {
      const span=70+rng()*120, left=Math.max(16,bx-span/2);
      out.push({x:bx,y:by,axis:'h',dir:rng()<.5?1:-1,sp,min:left,max:Math.min(456,left+span+24),w:24,h:24,dx:0,dy:0});
    }
  }
  return out;
}
let movers=makeMovers();

// dir:-1 fires LEFT (mounted on right wall), dir:1 fires RIGHT (mounted on left wall)
function makeLasers(){ return [
  {x:416,y:118,w:40,h:40,eyeY:140,dir:-1,state:'idle',t:70,beam:0},
  {x:24, y:236,w:40,h:40,eyeY:258,dir:1, state:'cool',t:96,beam:0},
]; }
let lasers=makeLasers();

function makeWig(){ return {x:196,y:184,w:56,h:56,dir:1,sp:0.6,min:150,max:252,bob:0}; }
let wig=makeWig();

/* PLAYER */
const WALK=2.3, GRAV=0.42, FALLMAX=6.6;
let player=newPlayer();
function newPlayer(){ return {x:SPAWN.x,y:SPAWN.y,w:20,h:24,vx:0,vy:0,prevY:SPAWN.y,
  onGround:false,stand:null,dropT:0,facing:1,walkAnim:0,stepCool:0}; }

/* STATE */
let state='title',boops=0,flashT=0,shake=0,gt=0,deathX=0,deathY=0;
let parts=[];
const binBG=[]; for(let i=0;i<40;i++) binBG.push({x:Math.random()*W,y:14+Math.random()*(H-40),c:Math.random()<.5?'0':'1'});

function resetGame(){ movers=makeMovers();lasers=makeLasers();wig=makeWig();player=newPlayer();
  parts.length=0;boops=0;flashT=0;shake=0;state='play';Audio.startMusic(); }
function startGame(){ if(state==='title')resetGame(); }
function respawn(){ player=newPlayer(); }
function die(x,y){ if(state!=='play')return; state='dead';flashT=0;boops++;shake=9;deathX=x;deathY=y;Audio.boop();
  for(let i=0;i<14;i++)parts.push({x,y,vx:(Math.random()*2-1)*3.2,vy:-1-Math.random()*3.4,
    life:42+Math.random()*16,char:Math.random()<.5?'0':'1',col:'#D97757'}); }
function winLevel(){ if(state!=='play')return; state='win';shake=6;Audio.get();setTimeout(Audio.win,360);
  for(let i=0;i<28;i++)parts.push({x:gem.x+12,y:gem.y+12,vx:(Math.random()*2-1)*3.2,vy:(Math.random()*2-1)*3.2,
    life:48+Math.random()*26,char:'+',col:Math.random()<.5?'#4285F4':'#9fc6ff'}); }

/* HELPERS */
function aabb(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function overlapX(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x;}

/* UPDATE */
function updateMovers(){ for(const m of movers){ const ox=m.x,oy=m.y;
  if(m.axis==='h'){ m.x+=m.dir*m.sp; if(m.x<=m.min){m.x=m.min;m.dir=1;} if(m.x+m.w>=m.max){m.x=m.max-m.w;m.dir=-1;} }
  else { m.y+=m.dir*m.sp; if(m.y<=m.min){m.y=m.min;m.dir=1;} if(m.y+m.h>=m.max){m.y=m.max-m.h;m.dir=-1;} }
  m.dx=m.x-ox; m.dy=m.y-oy; } }

function updateLaser(){ for(const L of lasers){ L.t--;
  if(L.state==='idle'){ if(L.t<=0){L.state='charge';L.t=40;Audio.charge();} }
  else if(L.state==='charge'){ if(L.t<=0){L.state='fire';L.t=28;Audio.zap();} }
  else if(L.state==='fire'){ L.beam=1; if(L.t<=0){L.state='cool';L.t=46;L.beam=0;} }
  else { if(L.t<=0){L.state='idle';L.t=60;} } } }

function updateWig(){ wig.x+=wig.dir*wig.sp;
  if(wig.x<=wig.min){wig.x=wig.min;wig.dir=1;} if(wig.x+wig.w>=wig.max){wig.x=wig.max-wig.w;wig.dir=-1;}
  wig.bob+=0.05; }

function updatePlayer(){
  if(player.stand&&player.onGround){ player.x+=player.stand.dx; player.y+=player.stand.dy; }
  if(player.dropT>0)player.dropT--;
  const ax=(input.r?1:0)-(input.l?1:0);
  player.vx=ax*WALK; if(ax<0)player.facing=-1; else if(ax>0)player.facing=1;
  player.x+=player.vx;
  if(input.d&&player.onGround&&player.stand){ player.dropT=12;player.onGround=false;player.stand=null;player.y+=2; }
  player.prevY=player.y;
  player.vy+=GRAV; if(player.vy>FALLMAX)player.vy=FALLMAX; player.y+=player.vy;
  player.onGround=false; player.stand=null;
  if(player.dropT<=0&&player.vy>0){ const pf=player.prevY+player.h, f=player.y+player.h;
    // bars
    for(const b of bars){ if(overlapX(player,b)&&pf<=b.y+2&&f>=b.y){player.y=b.y-player.h;player.vy=0;player.onGround=true;} }
    // movers
    for(const m of movers){ if(overlapX(player,m)&&pf<=m.y+3&&f>=m.y){player.y=m.y-player.h;player.vy=0;player.onGround=true;player.stand=m;} }
  }
  if(aabb(player,floor_)){ if(player.vy>0){player.y=floor_.y-player.h;player.vy=0;player.onGround=true;} }
  if(player.x<0)player.x=0; if(player.x>W-player.w)player.x=W-player.w;
  if(ax!==0&&player.onGround){ player.walkAnim+=0.32; if((player.stepCool--)<=0){Audio.step();player.stepCool=11;} }
  else player.walkAnim*=0.7;
}

function updateParts(){ for(const p of parts){p.x+=p.vx;p.y+=p.vy;p.vy+=0.16;p.life--;} parts=parts.filter(p=>p.life>0); }

function update(){ gt++; if(shake>0.4)shake*=0.86;
  if(state==='play'){ updateMovers();updateLaser();updateWig();updatePlayer();
    // laser beam hits — left-firing covers x<laser.x, right-firing covers x>laser.x+w
    for(const L of lasers){ if(!L.beam)continue; const by=L.eyeY;
      const inBand = player.y<by+5 && player.y+player.h>by-5;
      const inReach = L.dir<0 ? player.x<L.x : player.x+player.w>L.x+L.w;
      if(inBand&&inReach){ die(player.x+player.w/2,by); break; } }
    // wig body
    if(state==='play'){ const hb={x:wig.x+8,y:wig.y+14,w:wig.w-16,h:wig.h-16};
      if(aabb(player,hb)) die(player.x+player.w/2,player.y+player.h/2); }
    if(state==='play'&&aabb(player,gem)) winLevel();
    updateParts();
  } else if(state==='dead'){ updateMovers();updateLaser();updateWig();updateParts(); if(++flashT>=20){respawn();state='play';} }
  else if(state==='win'){ updateMovers();updateLaser();updateWig();updateParts(); }
  else { updateMovers();updateLaser();updateWig(); }
  Audio.tick();
}

/* RENDER */
function px(n){return Math.round(n);}
function drawBG(){ ctx.fillStyle='#0D1330';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(0,0,0,0.16)'; for(let y=40;y<H;y+=80)ctx.fillRect(0,y,W,26);
  ctx.font='9px "Press Start 2P", monospace'; ctx.fillStyle='rgba(77,126,245,0.13)';
  for(const b of binBG)ctx.fillText(b.c,b.x,b.y+Math.sin(gt*0.01+b.x)*1.5); }
function drawBar(b){ ctx.fillStyle='#1D2C66';ctx.fillRect(b.x,b.y,b.w,b.h);
  ctx.fillStyle='#2c3f88';ctx.fillRect(b.x,b.y,b.w,b.h-3); ctx.fillStyle='#FF6E24';ctx.fillRect(b.x,b.y,b.w,2); }
function drawMover(m){ const x=px(m.x),y=px(m.y);
  ctx.fillStyle='#2a44a0';ctx.fillRect(x,y,m.w,m.h);
  ctx.fillStyle='#4D7EF5';ctx.fillRect(x+1,y+1,m.w-2,m.h-4);
  ctx.fillStyle='#8fb0ff';ctx.fillRect(x+1,y+1,m.w-2,2);
  // direction nub
  ctx.fillStyle='#cfe0ff';
  if(m.axis==='h'){ if(m.dir>0)ctx.fillRect(x+m.w-5,y+m.h/2-1,3,3); else ctx.fillRect(x+2,y+m.h/2-1,3,3); }
  else { if(m.dir>0)ctx.fillRect(x+m.w/2-1,y+m.h-5,3,3); else ctx.fillRect(x+m.w/2-1,y+2,3,3); } }
function drawFloor(){ const p=floor_; ctx.fillStyle='#131B46';ctx.fillRect(p.x,p.y,p.w,p.h);
  ctx.fillStyle='#232D5F';ctx.fillRect(p.x,p.y,p.w,6); ctx.fillStyle='#FF6E24';ctx.fillRect(p.x,p.y,p.w,2); }
function drawGem(){ const t=gt*0.07,pr=1+Math.sin(t)*0.12,cx=gem.x+12,cy=gem.y+12+Math.sin(t*0.8)*2,r=11*pr;
  const g=ctx.createRadialGradient(cx,cy,1,cx,cy,r*2.4); g.addColorStop(0,'rgba(66,133,244,0.55)');g.addColorStop(1,'rgba(66,133,244,0)');
  ctx.fillStyle=g;ctx.fillRect(cx-r*2.4,cy-r*2.4,r*4.8,r*4.8);
  function star(rd,c){ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(cx,cy-rd);ctx.lineTo(cx+rd*.3,cy-rd*.3);
    ctx.lineTo(cx+rd,cy);ctx.lineTo(cx+rd*.3,cy+rd*.3);ctx.lineTo(cx,cy+rd);ctx.lineTo(cx-rd*.3,cy+rd*.3);
    ctx.lineTo(cx-rd,cy);ctx.lineTo(cx-rd*.3,cy-rd*.3);ctx.closePath();ctx.fill();}
  star(r*1.05,'#2f6fd0');star(r*0.66,'#9fc6ff');ctx.fillStyle='#fff';ctx.fillRect(cx-2,cy-2,4,4); }

function drawLasers(){ for(const L of lasers) drawOneLaser(L); }
function drawOneLaser(L){
  // right-firing lasers are drawn mirrored: flip canvas around the unit, reuse left-firing art
  if(L.dir>0){ ctx.save(); ctx.translate(W,0); ctx.scale(-1,1);
    drawLaserBody({...L, x:W-L.x-L.w}); ctx.restore(); }
  else drawLaserBody(L);
}
function drawLaserBody(L){ const x=px(L.x),y=px(L.y);
  // beam / telegraph (always drawn leftward in this local space)
  if(L.state==='charge'){ ctx.fillStyle='rgba(255,36,36,'+(0.15+0.25*((40-L.t)/40))+')'; ctx.fillRect(0,L.eyeY-1,x,2); }
  if(L.beam){ ctx.fillStyle='rgba(255,36,36,0.9)';ctx.fillRect(0,L.eyeY-5,x,10);
    ctx.fillStyle='rgba(255,180,170,0.9)';ctx.fillRect(0,L.eyeY-2,x,4);
    ctx.fillStyle='#fff';ctx.fillRect(0,L.eyeY-1,x,2); }
  // capped rock head
  ctx.fillStyle='#2c2e3c';ctx.fillRect(x,y+8,L.w,L.h-8);
  ctx.fillStyle='#48495c';ctx.fillRect(x+2,y+10,L.w-4,L.h-14);
  // cap (the fitted)
  ctx.fillStyle='#1D2C66';ctx.fillRect(x-4,y,L.w+2,12); ctx.fillStyle='#2c3f88';ctx.fillRect(x-4,y,L.w+2,4);
  ctx.fillStyle='#1D2C66';ctx.fillRect(x-12,y+6,12,5);  // brim
  // laser eyes
  const ec=(L.state==='charge'||L.beam);
  ctx.fillStyle=ec?'#ffd2cc':'#2a2a30'; ctx.fillRect(x+6,L.eyeY-3,9,6); ctx.fillRect(x+22,L.eyeY-3,9,6);
  ctx.fillStyle='#FF2424'; ctx.fillRect(x+7,L.eyeY-2,4,4); ctx.fillRect(x+23,L.eyeY-2,4,4);
  // mouth
  ctx.fillStyle='#FAF6EE';ctx.fillRect(x+8,y+L.h-9,L.w-16,4); }

function drawWig(){ const x=px(wig.x),y=px(wig.y),w=wig.w,h=wig.h, by=Math.sin(wig.bob)*2;
  // XL mane
  ctx.lineCap='round';
  for(let pass=0;pass<2;pass++){ ctx.strokeStyle=pass?'#a8925a':'#84703c';ctx.lineWidth=pass?3:5;
    for(let i=0;i<21;i++){ const rx=x+6+i*((w-12)/20), lean=(rx-(x+w/2))/(w/2)*0.7;
      const ang=-Math.PI/2+lean, ln=(pass?15:19);
      const ex=rx+Math.cos(ang)*ln*0.6+lean*16, ey=y+by+Math.sin(ang)*ln;
      const mx=rx+(ex-rx)*0.55+(i%2?3:-3), my=(y+by)+(ey-(y+by))*0.55;
      ctx.beginPath();ctx.moveTo(rx,y+by+4);ctx.lineTo(mx,my);ctx.lineTo(ex,ey);ctx.stroke(); } }
  for(let sy=y+10+by;sy<y+34+by;sy+=5){ ctx.strokeStyle='#84703c';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(x+4,sy);ctx.lineTo(x-3,sy+6);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x+w-4,sy);ctx.lineTo(x+w+3,sy+6);ctx.stroke(); }
  ctx.lineCap='butt';
  // skull
  ctx.fillStyle='#282a38';ctx.fillRect(x+6,y+10+by,w-12,h-14);
  ctx.fillStyle='#48495c';ctx.fillRect(x+9,y+14+by,w-18,h-22);
  ctx.fillStyle='#787c92';ctx.fillRect(x+9,y+14+by,w-18,4);
  // brows + red eyes
  ctx.fillStyle='#181a24';
  ctx.fillRect(x+11,y+20+by,12,4); ctx.fillRect(x+w-23,y+20+by,12,4);
  ctx.fillStyle='#FF2424';ctx.fillRect(x+13,y+24+by,8,7); ctx.fillRect(x+w-21,y+24+by,8,7);
  ctx.fillStyle='#ffb0a8';ctx.fillRect(x+14,y+25+by,3,2); ctx.fillRect(x+w-20,y+25+by,3,2);
  // teeth
  ctx.fillStyle='#FAF6EE';ctx.fillRect(x+12,y+h-12+by,w-24,6);
  ctx.fillStyle='#48495c'; for(let tx=x+15;tx<x+w-12;tx+=4)ctx.fillRect(tx,y+h-12+by,1,6); }

function drawPlayer(){ if(state==='dead')return; const x=px(player.x),y=px(player.y),w=player.w,h=player.h,f=player.facing;
  const bob=player.onGround?Math.sin(player.walkAnim)*1.3:0;
  ctx.fillStyle='#7a3f2a';ctx.fillRect(x+3,y+h-4+bob,5,4);ctx.fillRect(x+w-8,y+h-4+bob,5,4);
  const by=y+bob;
  ctx.fillStyle='#b35d3f';ctx.fillRect(x,by,w,h-4); ctx.fillStyle='#D97757';ctx.fillRect(x+1,by+1,w-2,h-7);
  ctx.fillStyle='#FF9A6E';ctx.fillRect(x+1,by+1,w-2,2);
  ctx.fillStyle='#0A0D22';const ex=f>0?x+6:x+4; ctx.fillRect(ex,by+6,4,5);ctx.fillRect(ex+7,by+6,4,5);
  ctx.fillStyle='#fff';ctx.fillRect(ex+(f>0?2:0),by+7,1,1);ctx.fillRect(ex+7+(f>0?2:0),by+7,1,1);
  const sc=x+w/2,sp=by+15; ctx.fillStyle='#FAF6EE';ctx.fillRect(sc-1,sp-3,2,7);ctx.fillRect(sc-3,sp-1,7,2); }

function drawParts(){ ctx.font='9px "Press Start 2P", monospace';
  for(const p of parts){ ctx.globalAlpha=Math.max(0,Math.min(1,p.life/24));ctx.fillStyle=p.col;ctx.fillText(p.char,p.x,p.y); } ctx.globalAlpha=1; }
function drawHUD(){ ctx.font='8px "Press Start 2P", monospace';
  ctx.fillStyle='#FF6E24';ctx.fillText('L4',8,16); ctx.fillStyle='#9fc6ff';ctx.fillText('THE CHURN',32,16);
  ctx.fillStyle='#FF2424';const bt='BOOPS '+boops;ctx.fillText(bt,W-8-bt.length*8,16); }
function drawCenter(lines){ ctx.fillStyle='rgba(7,10,28,0.84)';ctx.fillRect(0,0,W,H);
  for(const ln of lines){ ctx.font=ln.size+'px "Press Start 2P", monospace';ctx.fillStyle=ln.col;
    const tw=ctx.measureText(ln.t).width;ctx.fillText(ln.t,(W-tw)/2,ln.y); } }

function render(){ ctx.save(); if(shake>0.4)ctx.translate((Math.random()*2-1)*shake,(Math.random()*2-1)*shake);
  drawBG(); for(const b of bars)drawBar(b); drawFloor();
  for(const m of movers)drawMover(m); drawGem();
  drawWig(); drawLasers(); drawPlayer(); drawParts(); drawHUD();
  ctx.restore();
  if(state==='dead'){ const k=Math.min(1,flashT/4); ctx.fillStyle='rgba(255,255,255,'+(0.4*k)+')';ctx.fillRect(0,0,W,H);
    const r=30+flashT*40,g=ctx.createRadialGradient(deathX,deathY,2,deathX,deathY,r);
    g.addColorStop(0,'rgba(255,255,255,0.9)');g.addColorStop(1,'rgba(255,255,255,0)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H); }
  if(state==='title'){ drawCenter([
    {t:'CLAUDE BOT ROCK',y:104,size:18,col:'#D97757'},{t:'LEVEL 4',y:136,size:11,col:'#FF6E24'},
    {t:'THE CHURN',y:156,size:9,col:'#9fc6ff'},
    {t:'RIDE THE BLOCKS DOWN.',y:198,size:8,col:'#FAF6EE'},
    {t:'DODGE THE LASER & THE WIG.',y:214,size:7,col:'#FAF6EE'},
    {t:(Math.floor(gt/30)%2?'> PRESS ANY KEY / TAP <':'  PRESS ANY KEY / TAP  '),y:266,size:9,col:'#FF6E24'} ]); }
  else if(state==='win'){ drawCenter([
    {t:'LEVEL 4 CLEAR',y:128,size:18,col:'#9fc6ff'},{t:'GEMINI SECURED',y:158,size:8,col:'#bcd8ff'},
    {t:'BOOPS TAKEN  '+boops,y:188,size:9,col:'#FF2424'},
    {t:(Math.floor(gt/30)%2?'> TAP TO PLAY AGAIN <':'  TAP TO PLAY AGAIN  '),y:240,size:8,col:'#FAF6EE'} ]); }
}

let last=performance.now(),acc=0;const STEP=1000/60;
function frame(now){ acc+=Math.min(now-last,120);last=now; while(acc>=STEP){update();acc-=STEP;} render(); requestAnimationFrame(frame); }
requestAnimationFrame(frame);
</script>
</body>
