<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Claude Bot Rock — Level 3</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{ --indigo:#10132e; --cream:#f4f1e4; --coral:#d97757; --gold:#ffcf5a; --cyan:#9fc6ff; }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:radial-gradient(ellipse at 50% 0%, #14163a 0%, #0a0b1c 50%, #050610 100%);
    font-family:'Press Start 2P', monospace; color:var(--cream);
    display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
    min-height:100%; padding:14px 10px 26px; gap:10px;
    -webkit-tap-highlight-color:transparent; overflow-x:hidden;
  }
  .titlebar{text-align:center; line-height:1.5; user-select:none;}
  .titlebar .big{
    font-size:15px; color:var(--coral);
    text-shadow:2px 2px 0 #5a2418, 0 0 16px rgba(217,119,87,.5); letter-spacing:1px;
  }
  .titlebar .sub{font-size:7px; color:var(--cyan); margin-top:7px; opacity:.9;}
  #stage{
    position:relative; width:100%; max-width:472px; padding:7px; border-radius:6px;
    background:linear-gradient(160deg,#1a1d3e,#0c0e22);
    box-shadow:0 0 0 2px #04050c, 0 10px 28px rgba(0,0,0,.7),
               inset 0 0 0 1px rgba(255,255,255,.05);
  }
  canvas{
    display:block; width:100%; height:auto;
    image-rendering:pixelated; image-rendering:crisp-edges;
    border-radius:3px; background:#000;
  }
  .crt{
    position:absolute; inset:7px; border-radius:3px; pointer-events:none;
    background:
      repeating-linear-gradient(0deg, rgba(0,0,0,.18) 0 2px, rgba(0,0,0,0) 2px 4px),
      radial-gradient(ellipse at 50% 50%, rgba(0,0,0,0) 50%, rgba(0,0,0,.5) 100%);
    mix-blend-mode:multiply;
  }
  #controls{
    width:100%; max-width:472px;
    display:flex; align-items:center; justify-content:space-between; gap:10px; user-select:none;
  }
  .cluster{display:flex; gap:8px;}
  button.pad{
    font-family:inherit; font-size:16px; color:var(--cream);
    width:58px; height:48px; border:none; border-radius:7px;
    background:linear-gradient(180deg,#3a4078,#22264c);
    box-shadow:0 4px 0 #11132c, inset 0 1px 0 rgba(255,255,255,.14);
    touch-action:none; cursor:pointer; transition:transform .04s, box-shadow .04s;
  }
  button.pad:active, button.pad.on{
    transform:translateY(3px);
    box-shadow:0 1px 0 #11132c, inset 0 1px 0 rgba(255,255,255,.14);
    background:linear-gradient(180deg,#4a5294,#2c3160);
  }
  button.pad.climb{background:linear-gradient(180deg,#7a5a2c,#4a3818);
    box-shadow:0 4px 0 #2a2010, inset 0 1px 0 rgba(255,255,255,.14);}
  button.pad.climb:active, button.pad.climb.on{
    background:linear-gradient(180deg,#a07a3c,#5e4824);
    box-shadow:0 1px 0 #2a2010, inset 0 1px 0 rgba(255,255,255,.14);}
  .small{display:flex; flex-direction:column; gap:7px; align-items:center;}
  button.mini{
    font-family:inherit; font-size:6px; color:var(--cream);
    padding:7px 8px; border:none; border-radius:5px; cursor:pointer;
    background:#22264c; box-shadow:0 3px 0 #11132c; touch-action:none; letter-spacing:.5px;
  }
  button.mini:active{transform:translateY(2px); box-shadow:0 1px 0 #11132c;}
  .hint{font-size:6px; color:#6b6f9c; text-align:center; line-height:1.7;
    max-width:472px; margin-top:2px;}
</style>
</head>
<body>

<div class="titlebar">
  <div class="big">CLAUDE&nbsp;BOT&nbsp;ROCK</div>
  <div class="sub">LEVEL 3 — THE DARK RUN</div>
</div>

<div id="stage">
  <canvas id="cv" width="480" height="360"></canvas>
  <div class="crt"></div>
</div>

<div id="controls">
  <div class="cluster" aria-label="move">
    <button class="pad" data-k="l">&#9664;</button>
    <button class="pad" data-k="r">&#9654;</button>
  </div>
  <div class="small">
    <button class="mini" id="muteBtn">SOUND&nbsp;ON</button>
    <button class="mini" id="resetBtn">RESET</button>
  </div>
  <div class="cluster" aria-label="climb">
    <button class="pad climb" data-k="u">&#9650;</button>
    <button class="pad climb" data-k="d">&#9660;</button>
  </div>
</div>

<div class="hint">
  MOVE THE INSTANT YOU SPAWN &middot; THE DARK IS MINED &middot; LEARN IT BY DYING<br>
  KEYS: ARROWS / WASD &nbsp;&middot;&nbsp; M MUTE &nbsp;&middot;&nbsp; R RESET
</div>

<script>
"use strict";
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const W = 480, H = 360;

/* ---------- INPUT ---------- */
const input = { l:0, r:0, u:0, d:0 };
const KEYMAP = { ArrowLeft:'l', KeyA:'l', ArrowRight:'r', KeyD:'r',
                 ArrowUp:'u', KeyW:'u', ArrowDown:'d', KeyS:'d' };
addEventListener('keydown', e=>{
  if(KEYMAP[e.code]){ input[KEYMAP[e.code]]=1; e.preventDefault(); }
  if(e.code==='KeyM') Audio.toggleMute();
  if(e.code==='KeyR') resetGame();
  if(e.code==='Space'||e.code==='Enter'){ tapAction(); e.preventDefault(); }
  Audio.ensure();
  if(state==='title' && KEYMAP[e.code]) startGame();
});
addEventListener('keyup', e=>{ if(KEYMAP[e.code]) input[KEYMAP[e.code]]=0; });

document.querySelectorAll('button.pad').forEach(b=>{
  const k=b.dataset.k;
  const dn=e=>{ e.preventDefault(); input[k]=1; b.classList.add('on'); Audio.ensure();
                if(state==='title') startGame(); };
  const up=e=>{ if(e) e.preventDefault(); input[k]=0; b.classList.remove('on'); };
  b.addEventListener('pointerdown',dn);
  b.addEventListener('pointerup',up);
  b.addEventListener('pointerleave',up);
  b.addEventListener('pointercancel',up);
});
document.getElementById('muteBtn').addEventListener('click',()=>{ Audio.ensure(); Audio.toggleMute(); });
document.getElementById('resetBtn').addEventListener('click',()=>{ Audio.ensure(); resetGame(); });
cv.addEventListener('pointerdown', e=>{ e.preventDefault(); Audio.ensure(); tapAction(); });
function tapAction(){
  if(state==='title') startGame();
  else if(state==='win') resetGame();
}

/* ---------- AUDIO ---------- */
const Audio = (function(){
  let ctxA=null, master=null, musicG=null, sfxG=null;
  let muted=false, pulseOn=false, nextPulse=0, pulseTog=false;
  function ensure(){
    if(ctxA){ if(ctxA.state==='suspended') ctxA.resume(); return; }
    const AC=window.AudioContext||window.webkitAudioContext; if(!AC) return;
    ctxA=new AC();
    master=ctxA.createGain(); master.gain.value=0.9; master.connect(ctxA.destination);
    musicG=ctxA.createGain(); musicG.gain.value=0.6; musicG.connect(master);
    sfxG=ctxA.createGain(); sfxG.gain.value=0.9; sfxG.connect(master);
  }
  function note(t,freq,dur,type,vol,tgt){
    if(!freq||!ctxA) return;
    const o=ctxA.createOscillator(), g=ctxA.createGain();
    o.type=type; o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.linearRampToValueAtTime(vol,t+0.014);
    g.gain.exponentialRampToValueAtTime(0.0006,t+dur);
    o.connect(g); g.connect(tgt||sfxG); o.start(t); o.stop(t+dur+0.03);
  }
  function noise(dur,vol,freq){
    if(!ctxA) return;
    const n=Math.floor(ctxA.sampleRate*dur);
    const buf=ctxA.createBuffer(1,n,ctxA.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
    const s=ctxA.createBufferSource(); s.buffer=buf;
    const g=ctxA.createGain(); g.gain.value=vol;
    const lp=ctxA.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=freq||800;
    s.connect(lp); lp.connect(g); g.connect(sfxG); s.start();
  }
  function step(){ if(ctxA) note(ctxA.currentTime, 86+Math.random()*20, 0.05,'square',0.045); }
  function climb(){ if(ctxA) note(ctxA.currentTime, 200, 0.05,'square',0.05); }
  function boom(){
    if(!ctxA) return;
    const o=ctxA.createOscillator(), g=ctxA.createGain(), t=ctxA.currentTime;
    o.type='square'; o.frequency.setValueAtTime(360,t);
    o.frequency.exponentialRampToValueAtTime(38,t+0.4);
    g.gain.setValueAtTime(0.28,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.45);
    o.connect(g); g.connect(sfxG); o.start(t); o.stop(t+0.48);
    noise(0.32,0.26,1400);
  }
  function get(){
    if(!ctxA) return; const t=ctxA.currentTime;
    [523.25,659.25,783.99,1046.5].forEach((f,i)=> note(t+i*0.07,f,0.16,'square',0.13));
    note(t+0.3,1318.5,0.4,'triangle',0.12);
  }
  function win(){
    if(!ctxA) return; const t=ctxA.currentTime;
    [523.25,523.25,523.25,659.25,587.33,659.25,783.99].forEach((f,i)=>
      note(t+i*0.14,f,0.16,'square',0.13));
    note(t+0.98,1046.5,0.6,'square',0.13);
  }
  function startPulse(){ if(!ctxA) return; pulseOn=true; nextPulse=ctxA.currentTime+0.1; }
  function tickAudio(){
    if(pulseOn && ctxA){
      while(nextPulse < ctxA.currentTime+0.28){
        note(nextPulse, pulseTog?73.42:97.99, 0.18,'square',0.07,musicG);
        pulseTog=!pulseTog; nextPulse+=0.46;
      }
    }
  }
  function toggleMute(){
    muted=!muted;
    if(master) master.gain.value=muted?0:0.9;
    document.getElementById('muteBtn').textContent=muted?'SOUND OFF':'SOUND ON';
  }
  return { ensure,tickAudio,startPulse,toggleMute,step,climb,boom,get,win };
})();

/* ---------- LEVEL ---------- */
const SPAWN = { x:446, y:296 };
const floor_ = { x:0, y:322, w:480, h:38 };
// dim, faintly-lit geometry
const ladders = [
  { cx:300, top:158, bottom:322, w:22 },   // right ladder — climb partway, drift off
  { cx:74,  top:92,  bottom:322, w:22 },   // left ladder — straight up to the Gemini
];
const gem = { x:60, y:64, w:28, h:30, cx:74, cy:79 };

// bomb 1 — timed, drops on spawn. bombs 2 & 3 — invisible contact mines.
const FUSE = 120;                          // ~2 sec
const blast = { x:456, y:304, r:74 };
const mines = [
  { x:226, y:312, w:22, h:11 },            // bomb 2 — on the floor, left of the right ladder
  { x:288, y:148, w:24, h:22 },            // bomb 3 — at the top of the right ladder
];

/* ---------- PLAYER ---------- */
const WALK=2.6, GRAV=0.16, FALLMAX=3.4, CLIMB=1.9;   // floaty fall = the drift
let player = newPlayer();
function newPlayer(){
  return { x:SPAWN.x, y:SPAWN.y, w:20, h:26, vx:0, vy:0,
           onGround:false, onLadder:false, ladder:null,
           facing:-1, walkAnim:0, stepCool:0 };
}

/* ---------- STATE ---------- */
let state='title';                          // title | play | dead | win
let boops=0, flashT=0, shake=0, gt=0, levelTimer=0;
let bomb1Spent=false, det={t:0};
let deathX=0, deathY=0;

function resetGame(){
  player=newPlayer(); boops=0; flashT=0; shake=0;
  levelTimer=0; bomb1Spent=false; det.t=0;
  state='play'; Audio.startPulse();
}
function startGame(){ if(state==='title') resetGame(); }
function respawn(){                          // deterministic
  player=newPlayer(); levelTimer=0; bomb1Spent=false; det.t=0;
}
function die(x,y){
  if(state!=='play') return;
  state='dead'; flashT=0; boops++; shake=9;
  deathX=x; deathY=y; Audio.boom();
}
function winLevel(){
  if(state!=='play') return;
  state='win'; shake=5; Audio.get(); setTimeout(Audio.win,360);
}

/* ---------- HELPERS ---------- */
function aabb(a,b){
  return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
}
function onBand(p,l){ return Math.abs((p.x+p.w/2)-l.cx)<15; }

/* ---------- UPDATE ---------- */
function tryGrabLadder(){
  if(player.onLadder) return;
  for(const l of ladders){
    if(!onBand(player,l)) continue;
    const feet=player.y+player.h;
    if(input.u && feet>l.top+2 && player.y<l.bottom-2){
      player.onLadder=true; player.ladder=l; player.vy=0; return;
    }
    if(input.d && feet>=l.top-6 && feet<l.bottom-2){
      player.onLadder=true; player.ladder=l; player.vy=0;
      player.y=Math.max(player.y,l.top-player.h+4); return;
    }
  }
}
function updatePlayer(){
  if(player.onLadder){
    const l=player.ladder;
    const ay=(input.d?1:0)-(input.u?1:0);
    player.vy=ay*CLIMB; player.y+=player.vy;
    player.x += (l.cx-player.w/2 - player.x)*0.45;
    const topY=l.top-player.h, botY=l.bottom-player.h;
    if(player.y<=topY){ player.y=topY; player.onLadder=false; player.vy=0; }
    else if(player.y>=botY){ player.y=botY; player.onLadder=false; player.vy=0;
                             player.onGround=true; }
    if(input.l||input.r){ player.onLadder=false; }     // step off -> floaty drift
    if(player.onLadder && ay!==0){
      player.walkAnim+=0.3;
      if((player.stepCool--)<=0){ Audio.climb(); player.stepCool=12; }
    }
    if(input.l) player.facing=-1; if(input.r) player.facing=1;
    return;
  }
  tryGrabLadder();
  if(player.onLadder) return;

  const ax=(input.r?1:0)-(input.l?1:0);
  player.vx=ax*WALK;                          // full air control = the float
  if(ax<0) player.facing=-1; else if(ax>0) player.facing=1;
  player.x+=player.vx;
  if(player.x<0) player.x=0;
  if(player.x>W-player.w) player.x=W-player.w;

  player.vy+=GRAV; if(player.vy>FALLMAX) player.vy=FALLMAX;
  player.y+=player.vy;
  player.onGround=false;
  if(player.y+player.h>=floor_.y && player.y+player.h<=floor_.y+floor_.h+player.vy+2
     && player.x+player.w>floor_.x && player.x<floor_.x+floor_.w){
    player.y=floor_.y-player.h; player.vy=0; player.onGround=true;
  }
  if(player.y>H+90) die(player.x+player.w/2,H-20);

  if(ax!==0 && player.onGround){
    player.walkAnim+=0.32;
    if((player.stepCool--)<=0){ Audio.step(); player.stepCool=11; }
  } else player.walkAnim*=0.7;
}

function update(){
  gt++;
  if(shake>0.4) shake*=0.85;
  if(det.t>0) det.t--;
  if(state==='play'){
    levelTimer++;
    updatePlayer();
    // bomb 1 — the timed opener
    if(!bomb1Spent && levelTimer>=FUSE){
      bomb1Spent=true; det.t=14;
      const pcx=player.x+player.w/2, pcy=player.y+player.h/2;
      const dx=pcx-blast.x, dy=pcy-blast.y;
      if(dx*dx+dy*dy < blast.r*blast.r){ die(pcx,pcy); }
      else Audio.boom();
    }
    // bombs 2 & 3 — invisible contact mines
    if(state==='play'){
      for(const m of mines){
        if(aabb(player,m)){ die(player.x+player.w/2,player.y+player.h/2); break; }
      }
    }
    if(state==='play' && aabb(player,gem)) winLevel();
  } else if(state==='dead'){
    if(++flashT>=18){ respawn(); state='play'; }
  }
  Audio.tickAudio();
}

/* ---------- RENDER ---------- */
function px(n){ return Math.round(n); }

function drawBeacon(){
  const t=gt*0.05, pr=1+Math.sin(t)*0.06;
  const g=ctx.createRadialGradient(gem.cx,gem.cy,4, gem.cx,gem.cy,200*pr);
  g.addColorStop(0,'rgba(150,190,255,0.5)');
  g.addColorStop(0.25,'rgba(90,130,220,0.24)');
  g.addColorStop(0.6,'rgba(50,70,150,0.08)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  const cx=gem.cx, cy=gem.cy+Math.sin(t)*3, r=13*pr;
  function star(rad,col){
    ctx.fillStyle=col; ctx.beginPath();
    ctx.moveTo(cx,cy-rad); ctx.lineTo(cx+rad*0.30,cy-rad*0.30);
    ctx.lineTo(cx+rad,cy); ctx.lineTo(cx+rad*0.30,cy+rad*0.30);
    ctx.lineTo(cx,cy+rad); ctx.lineTo(cx-rad*0.30,cy+rad*0.30);
    ctx.lineTo(cx-rad,cy); ctx.lineTo(cx-rad*0.30,cy-rad*0.30);
    ctx.closePath(); ctx.fill();
  }
  star(r*1.1,'#2f6fd0'); star(r*0.7,'#bcd8ff');
  ctx.fillStyle='#fff'; ctx.fillRect(cx-2,cy-2,4,4);
}

function drawGeometry(){
  // floor — dim
  ctx.fillStyle='rgba(40,44,72,0.85)';
  ctx.fillRect(floor_.x,floor_.y,floor_.w,floor_.h);
  ctx.fillStyle='rgba(70,78,120,0.7)';
  ctx.fillRect(floor_.x,floor_.y,floor_.w,3);
  // ladders — faintly self-lit so they can be found
  for(const l of ladders){
    const x=l.cx-l.w/2;
    ctx.fillStyle='rgba(120,140,205,0.34)';
    ctx.fillRect(x,l.top,3,l.bottom-l.top);
    ctx.fillRect(x+l.w-3,l.top,3,l.bottom-l.top);
    for(let y=l.top+5;y<l.bottom-2;y+=12)
      ctx.fillRect(x,y,l.w,3);
  }
}

function drawDetonation(){
  if(det.t<=0) return;
  const k=det.t/14;
  const r=20+(14-det.t)*9;
  const g=ctx.createRadialGradient(blast.x,blast.y,2,blast.x,blast.y,r);
  g.addColorStop(0,'rgba(255,240,200,'+(0.9*k)+')');
  g.addColorStop(1,'rgba(255,160,80,0)');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
}

function drawPlayer(){
  if(state==='dead') return;
  const x=px(player.x), y=px(player.y), w=player.w, h=player.h, f=player.facing;
  const cx=x+w/2, cy=y+h/2;
  const g=ctx.createRadialGradient(cx,cy,1,cx,cy,30);
  g.addColorStop(0,'rgba(217,119,87,0.4)');
  g.addColorStop(1,'rgba(217,119,87,0)');
  ctx.fillStyle=g; ctx.fillRect(cx-30,cy-30,60,60);
  const bob=player.onGround?Math.sin(player.walkAnim)*1.2:0;
  ctx.fillStyle='#6e3a28'; ctx.fillRect(x+2,y+bob,w-4,h-4);
  ctx.fillStyle='#9a5238'; ctx.fillRect(x+3,y+1+bob,w-6,h-8);
  ctx.fillStyle='#c06a48';
  const ex=f>0?x+7:x+5;
  ctx.fillRect(ex,y+7+bob,3,4); ctx.fillRect(ex+6,y+7+bob,3,4);
  ctx.fillStyle='#e0a07e'; ctx.fillRect(cx-1,y+13+bob,2,2);
}

function drawFlash(){
  const k=Math.min(1,flashT/4);
  ctx.fillStyle='rgba(255,255,255,'+(0.55*k)+')';
  ctx.fillRect(0,0,W,H);
  const r=40+flashT*46;
  const g=ctx.createRadialGradient(deathX,deathY,2,deathX,deathY,r);
  g.addColorStop(0,'rgba(255,255,255,1)');
  g.addColorStop(0.7,'rgba(255,248,220,'+(0.9*k)+')');
  g.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  if(flashT>7){ ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H); }
}

function drawHUD(){
  ctx.font='8px "Press Start 2P", monospace';
  ctx.fillStyle='#5a5e8c'; ctx.fillText('L3',8,16);
  ctx.fillStyle='#7a3f3a';
  const bt='BOOPS '+boops;
  ctx.fillText(bt,W-8-bt.length*8,16);
}

function drawCenter(lines){
  ctx.fillStyle='rgba(3,3,8,0.86)'; ctx.fillRect(0,0,W,H);
  for(const ln of lines){
    ctx.font=ln.size+'px "Press Start 2P", monospace';
    ctx.fillStyle=ln.col;
    const tw=ctx.measureText(ln.t).width;
    ctx.fillText(ln.t,(W-tw)/2,ln.y);
  }
}

function render(){
  ctx.save();
  if(shake>0.4) ctx.translate((Math.random()*2-1)*shake,(Math.random()*2-1)*shake);
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
  drawBeacon();
  drawGeometry();
  // the three bombs render NOTHING — pure dark
  drawDetonation();
  drawPlayer();
  drawHUD();
  ctx.restore();

  if(state==='dead') drawFlash();

  if(state==='title'){
    drawCenter([
      {t:'CLAUDE BOT ROCK', y:100, size:18, col:'#d97757'},
      {t:'LEVEL 3', y:132, size:11, col:'#ffcf5a'},
      {t:'THE DARK RUN', y:152, size:9, col:'#9fc6ff'},
      {t:'A BOMB IS ALREADY', y:192, size:8, col:'#f4f1e4'},
      {t:'OVER YOUR HEAD.', y:208, size:8, col:'#f4f1e4'},
      {t:'MOVE.', y:226, size:9, col:'#ff8a5a'},
      {t:(Math.floor(gt/30)%2?'> PRESS ANY KEY / TAP <':'  PRESS ANY KEY / TAP  '),
        y:272, size:9, col:'#ffcf5a'},
    ]);
  } else if(state==='win'){
    drawCenter([
      {t:'LEVEL 3 CLEAR', y:128, size:18, col:'#9fc6ff'},
      {t:'YOU LEARNED THE DARK', y:158, size:7, col:'#bcd8ff'},
      {t:'BOOPS TAKEN  '+boops, y:188, size:9, col:'#ff5a4a'},
      {t:(Math.floor(gt/30)%2?'> TAP TO PLAY AGAIN <':'  TAP TO PLAY AGAIN  '),
        y:240, size:8, col:'#f4f1e4'},
    ]);
  }
}

/* ---------- LOOP ---------- */
let last=performance.now(), acc=0;
const STEP_MS=1000/60;
function frame(now){
  acc+=Math.min(now-last,120); last=now;
  while(acc>=STEP_MS){ update(); acc-=STEP_MS; }
  render();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
