<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Claude Bot Rock — Level 2</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{
    --indigo:#10132e; --indigo-d:#0a0c20; --cream:#f4f1e4;
    --coral:#d97757; --gold:#ffcf5a; --cyan:#6c9bf0; --danger:#ff5a4a;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:radial-gradient(ellipse at 50% 0%, #1c2150 0%, var(--indigo) 45%, var(--indigo-d) 100%);
    font-family:'Press Start 2P', monospace; color:var(--cream);
    display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
    min-height:100%; padding:14px 10px 26px; gap:10px;
    -webkit-tap-highlight-color:transparent; overflow-x:hidden;
  }
  .titlebar{text-align:center; line-height:1.5; user-select:none;}
  .titlebar .big{
    font-size:15px; color:var(--coral);
    text-shadow:2px 2px 0 #5a2418, 0 0 16px rgba(217,119,87,.5); letter-spacing:1px;
  }
  .titlebar .sub{font-size:7px; color:var(--cyan); margin-top:7px; opacity:.9;}
  #stage{
    position:relative; width:100%; max-width:472px;
    padding:7px; border-radius:6px;
    background:linear-gradient(160deg,#2a2f5e,#161936);
    box-shadow:0 0 0 2px #05060f, 0 10px 28px rgba(0,0,0,.6),
               inset 0 0 0 1px rgba(255,255,255,.06);
  }
  canvas{
    display:block; width:100%; height:auto;
    image-rendering:pixelated; image-rendering:crisp-edges;
    border-radius:3px; background:#10132e;
  }
  .crt{
    position:absolute; inset:7px; border-radius:3px; pointer-events:none;
    background:
      repeating-linear-gradient(0deg, rgba(0,0,0,.16) 0 2px, rgba(0,0,0,0) 2px 4px),
      radial-gradient(ellipse at 50% 50%, rgba(0,0,0,0) 55%, rgba(0,0,0,.45) 100%);
    mix-blend-mode:multiply;
  }
  #controls{
    width:100%; max-width:472px;
    display:flex; align-items:center; justify-content:space-between;
    gap:10px; user-select:none;
  }
  .cluster{display:flex; gap:8px;}
  button.pad{
    font-family:inherit; font-size:16px; color:var(--cream);
    width:58px; height:48px; border:none; border-radius:7px;
    background:linear-gradient(180deg,#3a4078,#22264c);
    box-shadow:0 4px 0 #11132c, inset 0 1px 0 rgba(255,255,255,.14);
    touch-action:none; cursor:pointer; transition:transform .04s, box-shadow .04s;
  }
  button.pad:active, button.pad.on{
    transform:translateY(3px);
    box-shadow:0 1px 0 #11132c, inset 0 1px 0 rgba(255,255,255,.14);
    background:linear-gradient(180deg,#4a5294,#2c3160);
  }
  button.pad.drop{background:linear-gradient(180deg,#7a5a2c,#4a3818);
    box-shadow:0 4px 0 #2a2010, inset 0 1px 0 rgba(255,255,255,.14);}
  button.pad.drop:active, button.pad.drop.on{
    background:linear-gradient(180deg,#a07a3c,#5e4824);
    box-shadow:0 1px 0 #2a2010, inset 0 1px 0 rgba(255,255,255,.14);}
  .small{display:flex; flex-direction:column; gap:7px; align-items:center;}
  button.mini{
    font-family:inherit; font-size:6px; color:var(--cream);
    padding:7px 8px; border:none; border-radius:5px; cursor:pointer;
    background:#2a2f5e; box-shadow:0 3px 0 #11132c; touch-action:none; letter-spacing:.5px;
  }
  button.mini:active{transform:translateY(2px); box-shadow:0 1px 0 #11132c;}
  .hint{font-size:6px; color:#8b8fc0; text-align:center; line-height:1.7;
    max-width:472px; margin-top:2px;}
</style>
</head>
<body>

<div class="titlebar">
  <div class="big">CLAUDE&nbsp;BOT&nbsp;ROCK</div>
  <div class="sub">LEVEL 2 — THE GEMINI DROP</div>
</div>

<div id="stage">
  <canvas id="cv" width="480" height="360"></canvas>
  <div class="crt"></div>
</div>

<div id="controls">
  <div class="cluster" aria-label="move">
    <button class="pad" data-k="l">&#9664;</button>
    <button class="pad" data-k="r">&#9654;</button>
  </div>
  <div class="small">
    <button class="mini" id="muteBtn">SOUND&nbsp;ON</button>
    <button class="mini" id="resetBtn">RESET</button>
  </div>
  <div class="cluster" aria-label="drop">
    <button class="pad drop" data-k="d">&#9660;</button>
  </div>
</div>

<div class="hint">
  RIDE THE PLATFORMS &middot; PRESS &#9660; TO DROP THROUGH &middot; REACH THE GEMINI<br>
  KEYS: ARROWS / WASD &nbsp;&middot;&nbsp; M MUTE &nbsp;&middot;&nbsp; R RESET
</div>

<script>
"use strict";
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const W = 480, H = 360;

/* ---------- INPUT ---------- */
const input = { l:0, r:0, u:0, d:0 };
const KEYMAP = { ArrowLeft:'l', KeyA:'l', ArrowRight:'r', KeyD:'r',
                 ArrowUp:'u', KeyW:'u', ArrowDown:'d', KeyS:'d' };
addEventListener('keydown', e=>{
  if(KEYMAP[e.code]){ input[KEYMAP[e.code]]=1; e.preventDefault(); }
  if(e.code==='KeyM') Audio.toggleMute();
  if(e.code==='KeyR') resetGame();
  if(e.code==='Space'||e.code==='Enter'){ tapAction(); e.preventDefault(); }
  Audio.ensure();
  if(state==='title' && KEYMAP[e.code]) startGame();
});
addEventListener('keyup', e=>{ if(KEYMAP[e.code]) input[KEYMAP[e.code]]=0; });

document.querySelectorAll('button.pad').forEach(b=>{
  const k=b.dataset.k;
  const dn=e=>{ e.preventDefault(); input[k]=1; b.classList.add('on'); Audio.ensure();
                if(state==='title') startGame(); };
  const up=e=>{ if(e) e.preventDefault(); input[k]=0; b.classList.remove('on'); };
  b.addEventListener('pointerdown',dn);
  b.addEventListener('pointerup',up);
  b.addEventListener('pointerleave',up);
  b.addEventListener('pointercancel',up);
});
document.getElementById('muteBtn').addEventListener('click',()=>{ Audio.ensure(); Audio.toggleMute(); });
document.getElementById('resetBtn').addEventListener('click',()=>{ Audio.ensure(); resetGame(); });
cv.addEventListener('pointerdown', e=>{ e.preventDefault(); Audio.ensure(); tapAction(); });
function tapAction(){
  if(state==='title') startGame();
  else if(state==='win') resetGame();
}

/* ---------- AUDIO ---------- */
const Audio = (function(){
  let ctxA=null, master=null, musicG=null, sfxG=null;
  let muted=false, musicOn=false, nextLoop=0;
  const STEP=0.135;
  const LEAD=[440,0,523.25,659.25, 587.33,0,523.25,440, 392,0,440,523.25, 392,0,329.63,0];
  const BASS=[110,0,110,0, 98,0,98,0, 110,0,110,0, 82.41,0,82.41,0];
  function ensure(){
    if(ctxA){ if(ctxA.state==='suspended') ctxA.resume(); return; }
    const AC=window.AudioContext||window.webkitAudioContext; if(!AC) return;
    ctxA=new AC();
    master=ctxA.createGain(); master.gain.value=0.9; master.connect(ctxA.destination);
    musicG=ctxA.createGain(); musicG.gain.value=0.55; musicG.connect(master);
    sfxG=ctxA.createGain(); sfxG.gain.value=0.9; sfxG.connect(master);
  }
  function note(t,freq,dur,type,vol,tgt){
    if(!freq||!ctxA) return;
    const o=ctxA.createOscillator(), g=ctxA.createGain();
    o.type=type; o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.linearRampToValueAtTime(vol,t+0.012);
    g.gain.exponentialRampToValueAtTime(0.0006,t+dur);
    o.connect(g); g.connect(tgt||sfxG); o.start(t); o.stop(t+dur+0.03);
  }
  function noise(dur,vol,freq){
    if(!ctxA) return;
    const n=Math.floor(ctxA.sampleRate*dur);
    const buf=ctxA.createBuffer(1,n,ctxA.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
    const s=ctxA.createBufferSource(); s.buffer=buf;
    const g=ctxA.createGain(); g.gain.value=vol;
    const lp=ctxA.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=freq||900;
    s.connect(lp); lp.connect(g); g.connect(sfxG); s.start();
  }
  function scheduleLoop(t){
    for(let i=0;i<16;i++){
      note(t+i*STEP, LEAD[i], STEP*0.92,'square',0.082,musicG);
      note(t+i*STEP, BASS[i], STEP*1.7,'square',0.072,musicG);
    }
  }
  function step(){ if(ctxA) note(ctxA.currentTime, 95+Math.random()*22, 0.05,'square',0.05); }
  function shoot(){ if(ctxA){ note(ctxA.currentTime,520,0.05,'square',0.07); noise(0.08,0.07,1600);} }
  function whomp(){
    if(!ctxA) return;
    const o=ctxA.createOscillator(), g=ctxA.createGain(), t=ctxA.currentTime;
    o.type='square'; o.frequency.setValueAtTime(330,t);
    o.frequency.exponentialRampToValueAtTime(48,t+0.3);
    g.gain.setValueAtTime(0.24,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.32);
    o.connect(g); g.connect(sfxG); o.start(t); o.stop(t+0.35);
    noise(0.16,0.2);
  }
  function alert_(){ if(ctxA){ note(ctxA.currentTime,880,0.07,'square',0.1);
                               note(ctxA.currentTime+0.1,880,0.07,'square',0.1);} }
  function boop(){
    if(!ctxA) return;
    const o=ctxA.createOscillator(), g=ctxA.createGain(), t=ctxA.currentTime;
    o.type='square'; o.frequency.setValueAtTime(240,t);
    o.frequency.exponentialRampToValueAtTime(48,t+0.42);
    g.gain.setValueAtTime(0.2,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.45);
    o.connect(g); g.connect(sfxG); o.start(t); o.stop(t+0.48);
    noise(0.2,0.16);
  }
  function get(){
    if(!ctxA) return; const t=ctxA.currentTime;
    [523.25,659.25,783.99,1046.5].forEach((f,i)=> note(t+i*0.07,f,0.16,'square',0.13));
    note(t+0.3,1318.5,0.4,'triangle',0.12);
  }
  function win(){
    if(!ctxA) return; const t=ctxA.currentTime;
    [523.25,523.25,523.25,659.25,587.33,659.25,783.99].forEach((f,i)=>
      note(t+i*0.14,f,0.16,'square',0.13));
    note(t+0.98,1046.5,0.6,'square',0.13);
  }
  function startMusic(){ if(!ctxA) return; musicOn=true; nextLoop=ctxA.currentTime+0.08; }
  function tickAudio(){
    if(musicOn && ctxA){
      while(nextLoop < ctxA.currentTime+0.32){ scheduleLoop(nextLoop); nextLoop+=16*STEP; }
    }
  }
  function toggleMute(){
    muted=!muted;
    if(master) master.gain.value=muted?0:0.9;
    document.getElementById('muteBtn').textContent=muted?'SOUND OFF':'SOUND ON';
  }
  return { ensure,tickAudio,startMusic,toggleMute,step,shoot,whomp,alert:alert_,boop,get,win };
})();

/* ---------- LEVEL DATA ---------- */
const SPAWN = { x:228, y:54 };
const floor_ = { x:0, y:322, w:480, h:38 };
const gemini = { x:220, y:296, w:26, h:26, cx:233, cy:309 };

// moving one-way drop-through platforms
function makePlatforms(){
  return [
    { x:60,  y:96,  w:106, h:13, min:34, max:330, dir:1,  speed:1.05, dx:0,
      turtle:false },
    { x:236, y:150, w:106, h:13, min:48, max:322, dir:-1, speed:1.35, dx:0,
      turtle:true,  turtleAlive:true, fireTimer:55 },
    { x:78,  y:206, w:106, h:13, min:34, max:330, dir:1,  speed:1.0,  dx:0,
      turtle:true,  turtleAlive:true, fireTimer:90 },
    { x:250, y:262, w:106, h:13, min:58, max:300, dir:-1, speed:1.5,  dx:0,
      turtle:true,  turtleAlive:true, fireTimer:120 },
  ];
}
let platforms = makePlatforms();

// the hunting Wig Thwomp boss
function makeBoss(){
  return { x:220, y:24, w:40, h:40, homeY:24, dir:1, speed:1.7,
           state:'patrol', timer:0, prevY:24, slamSpd:0, flash:0 };
}
let boss = makeBoss();

/* ---------- PLAYER ---------- */
const WALK=1.75, GRAV=0.46, FALLMAX=7.6;
let player = newPlayer();
function newPlayer(){
  return { x:SPAWN.x, y:SPAWN.y, w:20, h:26, vx:0, vy:0, prevY:SPAWN.y,
           onGround:false, standPlat:null, dropTimer:0,
           facing:1, walkAnim:0, stepCool:0 };
}

/* ---------- STATE ---------- */
let state='title';                 // title | play | dead | win
let boops=0, deadTimer=0, shake=0, gt=0;
let shards=[], parts=[];
const binBG=[];
for(let i=0;i<46;i++)
  binBG.push({ x:Math.random()*W, y:14+Math.random()*(H-40),
               c:Math.random()<0.5?'0':'1' });

function resetGame(){
  platforms=makePlatforms(); boss=makeBoss(); player=newPlayer();
  shards.length=0; parts.length=0; boops=0; shake=0; deadTimer=0;
  state='play'; Audio.startMusic();
}
function startGame(){ if(state==='title') resetGame(); }
function respawn(){ player=newPlayer(); }
function die(){
  if(state!=='play') return;
  state='dead'; deadTimer=46; boops++; shake=10; Audio.boop();
  for(let i=0;i<16;i++) parts.push({
    x:player.x+player.w/2, y:player.y+player.h/2,
    vx:(Math.random()*2-1)*3.2, vy:-1-Math.random()*3.6,
    life:46+Math.random()*18, char:Math.random()<0.5?'0':'1', col:'#d97757' });
}
function winLevel(){
  if(state!=='play') return;
  state='win'; shake=6; Audio.get(); setTimeout(Audio.win,360);
  for(let i=0;i<30;i++) parts.push({
    x:gemini.cx, y:gemini.cy,
    vx:(Math.random()*2-1)*3.4, vy:(Math.random()*2-1)*3.4,
    life:50+Math.random()*30, char:'+',
    col:Math.random()<0.5?'#6c9bf0':'#bfe0ff' });
}

/* ---------- HELPERS ---------- */
function aabb(a,b){
  return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
}
function overlapX(a,b){ return a.x<b.x+b.w && a.x+a.w>b.x; }
function turtleBox(p){ return { x:p.x+p.w/2-11, y:p.y+p.h, w:22, h:15 }; }

/* ---------- UPDATE ---------- */
function updatePlatforms(){
  for(const p of platforms){
    const ox=p.x;
    p.x += p.dir*p.speed;
    if(p.x<=p.min){ p.x=p.min; p.dir=1; }
    if(p.x+p.w>=p.max){ p.x=p.max-p.w; p.dir=-1; }
    p.dx = p.x-ox;
  }
}

function updateBoss(){
  const b=boss;
  if(b.flash>0) b.flash--;
  if(b.state==='patrol'){
    b.y=b.homeY;
    b.x += b.dir*b.speed;
    if(b.x<=8){ b.x=8; b.dir=1; }
    if(b.x+b.w>=W-8){ b.x=W-8-b.w; b.dir=-1; }
    const pc=player.x+player.w/2, tc=b.x+b.w/2;
    if(Math.abs(pc-tc)<16){ b.state='windup'; b.timer=30; Audio.alert(); }
  } else if(b.state==='windup'){
    b.flash=4;
    b.y=b.homeY - Math.min(8,(30-b.timer)*0.4);   // rears up
    if(--b.timer<=0){ b.state='slam'; b.slamSpd=3; b.prevY=b.y; }
  } else if(b.state==='slam'){
    b.prevY=b.y;
    b.slamSpd=Math.min(b.slamSpd+0.55,8.5);
    b.y += b.slamSpd;
    const bot=b.y+b.h;
    let landY=null, landPlat=null;
    for(const p of platforms){
      if(overlapX(b,p) && b.prevY+b.h<=p.y+1 && bot>=p.y){
        if(landY===null||p.y<landY){ landY=p.y; landPlat=p; }
      }
    }
    if(b.prevY+b.h<=floor_.y+1 && bot>=floor_.y){
      if(landY===null||floor_.y<landY){ landY=floor_.y; landPlat=null; }
    }
    if(landY!==null){
      b.y=landY-b.h; b.state='rest'; b.timer=22;
      shake=Math.max(shake,8); Audio.whomp();
      for(let i=0;i<8;i++) parts.push({
        x:b.x+Math.random()*b.w, y:landY,
        vx:(Math.random()*2-1)*2.6, vy:-Math.random()*2.2,
        life:18+Math.random()*10, char:'.', col:'#8b8fc0' });
      if(landPlat && landPlat.turtle && landPlat.turtleAlive){
        landPlat.turtleAlive=false;
        shake=Math.max(shake,12);
        const tb=turtleBox(landPlat);
        for(let i=0;i<14;i++) parts.push({
          x:tb.x+Math.random()*tb.w, y:tb.y+tb.h/2,
          vx:(Math.random()*2-1)*3.4, vy:(Math.random()*2-1)*3,
          life:30+Math.random()*16,
          char:Math.random()<0.5?'x':'/', col:'#7fae5a' });
      }
    }
  } else if(b.state==='rest'){
    if(--b.timer<=0) b.state='retract';
  } else { // retract
    b.y -= 2.5;
    if(b.y<=b.homeY){ b.y=b.homeY; b.state='patrol'; }
  }
}

function updatePlayer(){
  // carried by the platform you stand on
  if(player.standPlat && player.onGround) player.x += player.standPlat.dx;
  if(player.dropTimer>0) player.dropTimer--;

  // horizontal
  const ax=(input.r?1:0)-(input.l?1:0);
  player.vx=ax*WALK;
  if(ax<0) player.facing=-1; else if(ax>0) player.facing=1;
  player.x += player.vx;

  // drop-through request
  if(input.d && player.onGround && player.standPlat){
    player.dropTimer=14; player.onGround=false; player.standPlat=null;
    player.y += 2;
  }

  // gravity
  player.prevY=player.y;
  player.vy+=GRAV; if(player.vy>FALLMAX) player.vy=FALLMAX;
  player.y+=player.vy;
  player.onGround=false; player.standPlat=null;

  // one-way platform landing
  if(player.dropTimer<=0 && player.vy>0){
    const feet=player.y+player.h, pfeet=player.prevY+player.h;
    for(const p of platforms){
      if(overlapX(player,p) && pfeet<=p.y+2 && feet>=p.y){
        player.y=p.y-player.h; player.vy=0;
        player.onGround=true; player.standPlat=p;
      }
    }
  }
  // solid bottom floor
  if(aabb(player,floor_)){
    if(player.vy>0){ player.y=floor_.y-player.h; player.vy=0; player.onGround=true; }
    else if(player.vy<0){ player.y=floor_.y+floor_.h; player.vy=0; }
  }
  // screen bounds
  if(player.x<0) player.x=0;
  if(player.x>W-player.w) player.x=W-player.w;
  if(player.y>H+80) die();

  if(ax!==0 && player.onGround){
    player.walkAnim+=0.32;
    if((player.stepCool--)<=0){ Audio.step(); player.stepCool=11; }
  } else player.walkAnim*=0.7;
}

function updateShards(){
  for(const p of platforms){
    if(p.turtle && p.turtleAlive && state==='play'){
      if((p.fireTimer--)<=0){
        const tb=turtleBox(p);
        shards.push({ x:tb.x+tb.w/2-3, y:tb.y+tb.h, w:7, h:9, vy:2.7, spin:0 });
        p.fireTimer=72+Math.random()*34; Audio.shoot();
      }
    }
  }
  for(const s of shards){ s.y+=s.vy; s.vy=Math.min(s.vy+0.04,4.4); s.spin+=0.3; }
  shards = shards.filter(s=> s.y<H+20);
}

function updateParts(){
  for(const p of parts){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.16; p.life--; }
  parts = parts.filter(p=>p.life>0);
}

function update(){
  gt++;
  if(shake>0.4) shake*=0.86;
  if(state==='play'){
    updatePlatforms();
    updateBoss();
    updatePlayer();
    updateShards();
    // boss body / slam vs player
    if(aabb(player,boss)) die();
    // shrapnel vs player
    for(const s of shards){ if(aabb(player,s)){ die(); break; } }
    // win
    if(aabb(player,gemini)) winLevel();
    updateParts();
  } else if(state==='dead'){
    updatePlatforms(); updateBoss(); updateShards(); updateParts();
    if(--deadTimer<=0){ respawn(); state='play'; }
  } else if(state==='win'){
    updatePlatforms(); updateBoss(); updateParts();
  } else {
    updatePlatforms(); updateBoss();
  }
  Audio.tickAudio();
}

/* ---------- RENDER ---------- */
function px(n){ return Math.round(n); }

function drawBG(){
  ctx.fillStyle='#10132e'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(0,0,0,0.18)';
  for(let y=40;y<H;y+=80) ctx.fillRect(0,y,W,28);
  ctx.font='9px "Press Start 2P", monospace';
  ctx.fillStyle='rgba(108,140,200,0.15)';
  for(const b of binBG)
    ctx.fillText(b.c, b.x, b.y+Math.sin(gt*0.01+b.x)*1.5);
}

function drawFloor(){
  const p=floor_;
  ctx.fillStyle='#241f33'; ctx.fillRect(p.x,p.y,p.w,p.h);
  ctx.fillStyle='#3b3550'; ctx.fillRect(p.x,p.y,p.w,8);
  ctx.fillStyle='#6b6488'; ctx.fillRect(p.x,p.y,p.w,3);
  ctx.fillStyle='rgba(0,0,0,0.35)';
  for(let x=p.x+6;x<p.x+p.w;x+=22) ctx.fillRect(x,p.y+10,2,p.h-12);
}

function drawPlatform(p){
  const x=px(p.x), y=px(p.y);
  ctx.fillStyle='#233a5c'; ctx.fillRect(x,y,p.w,p.h);
  ctx.fillStyle='#3a5a8c'; ctx.fillRect(x,y,p.w,p.h-3);
  ctx.fillStyle='#6f9bd6'; ctx.fillRect(x,y,p.w,3);
  ctx.fillStyle='#9fc4f0';
  for(let i=x+6;i<x+p.w-3;i+=18) ctx.fillRect(i,y+6,3,3);
  // direction nub
  ctx.fillStyle='#cfe0ff';
  if(p.dir>0) ctx.fillRect(x+p.w-5,y+5,3,3); else ctx.fillRect(x+2,y+5,3,3);
}

function drawTurtle(p){
  if(!p.turtle || !p.turtleAlive) return;
  const tb=turtleBox(p), x=px(tb.x), y=px(tb.y), w=tb.w, h=tb.h;
  // shell flush under platform
  ctx.fillStyle='#3c5e2a'; ctx.fillRect(x,y-2,w,5);
  ctx.fillStyle='#5e8a3a'; ctx.fillRect(x+2,y,w-4,h-4);
  ctx.fillStyle='#7fae5a'; ctx.fillRect(x+2,y,w-4,2);
  // hex shell marks
  ctx.fillStyle='#3c5e2a';
  ctx.fillRect(x+5,y+3,3,3); ctx.fillRect(x+w-8,y+3,3,3);
  ctx.fillRect(x+w/2-1,y+6,3,3);
  // legs poking down/out
  ctx.fillStyle='#4a6e30';
  ctx.fillRect(x+1,y+h-6,3,5); ctx.fillRect(x+w-4,y+h-6,3,5);
  // angry eyes (it is upside down, glaring down)
  ctx.fillStyle='#ff5a4a';
  ctx.fillRect(x+5,y+h-7,4,3); ctx.fillRect(x+w-9,y+h-7,4,3);
  // straw barrel
  ctx.fillStyle='#d9d2b8';
  ctx.fillRect(x+w/2-2,y+h-3,4,5);
  ctx.fillStyle='#8b8460'; ctx.fillRect(x+w/2-2,y+h+1,4,1);
}

function drawShard(s){
  const cx=s.x+s.w/2, cy=s.y+s.h/2;
  ctx.save(); ctx.translate(cx,cy); ctx.rotate(s.spin);
  ctx.fillStyle='#b9bcc8'; ctx.fillRect(-3,-4,6,8);
  ctx.fillStyle='#eef0f6'; ctx.fillRect(-3,-4,6,2);
  ctx.fillStyle='#6b6f80'; ctx.fillRect(-1,2,2,2);
  ctx.restore();
}

function drawBoss(){
  const b=boss, x=px(b.x), y=px(b.y), w=b.w, h=b.h;
  const winding=(b.state==='windup');
  // wild hair
  ctx.lineCap='round';
  for(let pass=0;pass<2;pass++){
    ctx.strokeStyle=pass?'#c9b27a':'#9a8550';
    ctx.lineWidth=pass?2:3;
    for(let i=0;i<13;i++){
      const a=(i/12)*Math.PI-Math.PI/2;
      const sway=Math.sin(gt*0.12+i*1.1)*4;
      const sx=x+w/2+Math.cos(a)*(w*0.44);
      const sy=y+7+Math.sin(a)*(h*0.16);
      const len=pass?13:16;
      ctx.beginPath(); ctx.moveTo(sx,sy);
      ctx.lineTo(sx+Math.cos(a)*len+sway, sy+Math.sin(a)*len-7);
      ctx.stroke();
    }
  }
  ctx.lineCap='butt';
  // rock head
  ctx.fillStyle='#38383f'; ctx.fillRect(x,y,w,h);
  ctx.fillStyle='#5b5b66'; ctx.fillRect(x+2,y+2,w-4,h-4);
  ctx.fillStyle='#888893'; ctx.fillRect(x+2,y+2,w-4,3);
  // brows
  ctx.fillStyle='#2a2a30';
  ctx.fillRect(x+5,y+12,12,4); ctx.fillRect(x+w-17,y+12,12,4);
  // eyes — flash white during windup
  const eyeOn = winding ? (b.flash>2) : true;
  ctx.fillStyle = winding ? (eyeOn?'#fff2b0':'#ff5a4a') : '#ff5a4a';
  ctx.fillRect(x+7,y+16,8,8); ctx.fillRect(x+w-15,y+16,8,8);
  ctx.fillStyle='#ffd2cc';
  ctx.fillRect(x+10,y+18,3,3); ctx.fillRect(x+w-12,y+18,3,3);
  // gritted teeth
  ctx.fillStyle='#e8e8ee'; ctx.fillRect(x+7,y+h-11,w-14,6);
  ctx.fillStyle='#5b5b66';
  for(let tx=x+10;tx<x+w-10;tx+=5) ctx.fillRect(tx,y+h-11,1,6);
  // windup warning beam
  if(winding){
    ctx.fillStyle='rgba(255,90,74,'+(0.10+0.10*(b.flash>2?1:0))+')';
    ctx.fillRect(x+6,y+h,w-12,H);
  }
}

function drawGemini(){
  const t=gt*0.07, pulse=1+Math.sin(t)*0.12;
  const cx=gemini.cx, cy=gemini.cy+Math.sin(t*0.8)*2.2, r=11*pulse;
  const g=ctx.createRadialGradient(cx,cy,1,cx,cy,r*2.4);
  g.addColorStop(0,'rgba(108,155,240,0.55)');
  g.addColorStop(1,'rgba(108,155,240,0)');
  ctx.fillStyle=g; ctx.fillRect(cx-r*2.4,cy-r*2.4,r*4.8,r*4.8);
  function star(rad,col){
    ctx.fillStyle=col; ctx.beginPath();
    ctx.moveTo(cx,cy-rad); ctx.lineTo(cx+rad*0.30,cy-rad*0.30);
    ctx.lineTo(cx+rad,cy); ctx.lineTo(cx+rad*0.30,cy+rad*0.30);
    ctx.lineTo(cx,cy+rad); ctx.lineTo(cx-rad*0.30,cy+rad*0.30);
    ctx.lineTo(cx-rad,cy); ctx.lineTo(cx-rad*0.30,cy-rad*0.30);
    ctx.closePath(); ctx.fill();
  }
  star(r*1.05,'#2f6fd0');
  star(r*0.66,'#9fc6ff');
  ctx.fillStyle='#fff'; ctx.fillRect(cx-2,cy-2,4,4);
}

function drawPlayer(){
  if(state==='dead') return;
  const x=px(player.x), y=px(player.y), w=player.w, h=player.h, f=player.facing;
  const bob=player.onGround?Math.sin(player.walkAnim)*1.4:0;
  const legSwing=Math.sin(player.walkAnim)*3;
  ctx.fillStyle='#7a3f2a';
  ctx.fillRect(x+3,y+h-4+bob,5,4+legSwing*0.6);
  ctx.fillRect(x+w-8,y+h-4+bob,5,4-legSwing*0.6);
  const by=y+bob;
  ctx.fillStyle='#b35d3f'; ctx.fillRect(x,by,w,h-4);
  ctx.fillStyle='#d97757'; ctx.fillRect(x+1,by+1,w-2,h-7);
  ctx.fillStyle='#f5b896'; ctx.fillRect(x+1,by+1,w-2,2);
  ctx.fillStyle='#1c1410';
  const ex=f>0?x+6:x+4;
  ctx.fillRect(ex,by+6,4,5); ctx.fillRect(ex+7,by+6,4,5);
  ctx.fillStyle='#fff';
  ctx.fillRect(ex+(f>0?2:0),by+7,1,1);
  ctx.fillRect(ex+7+(f>0?2:0),by+7,1,1);
  const sp=by+15, sc=x+w/2;
  ctx.fillStyle='#ffd9c2';
  ctx.fillRect(sc-1,sp-3,2,7); ctx.fillRect(sc-3,sp-1,7,2);
  ctx.fillStyle='#fff4ec'; ctx.fillRect(sc,sp,1,1);
}

function drawParts(){
  ctx.font='9px "Press Start 2P", monospace';
  for(const p of parts){
    ctx.globalAlpha=Math.max(0,Math.min(1,p.life/24));
    ctx.fillStyle=p.col; ctx.fillText(p.char,p.x,p.y);
  }
  ctx.globalAlpha=1;
}

function drawHUD(){
  ctx.font='8px "Press Start 2P", monospace';
  ctx.fillStyle='#ffcf5a'; ctx.fillText('L2',8,16);
  ctx.fillStyle='#9fc6ff'; ctx.fillText('THE GEMINI',32,16);
  ctx.fillStyle='#ff5a4a';
  const bt='BOOPS '+boops;
  ctx.fillText(bt,W-8-bt.length*8,16);
}

function drawCenter(lines){
  ctx.fillStyle='rgba(8,9,22,0.82)'; ctx.fillRect(0,0,W,H);
  for(const ln of lines){
    ctx.font=ln.size+'px "Press Start 2P", monospace';
    ctx.fillStyle=ln.col;
    const tw=ctx.measureText(ln.t).width;
    ctx.fillText(ln.t,(W-tw)/2,ln.y);
  }
}

function render(){
  ctx.save();
  if(shake>0.4) ctx.translate((Math.random()*2-1)*shake,(Math.random()*2-1)*shake);
  drawBG();
  drawFloor();
  for(const p of platforms){ drawTurtle(p); drawPlatform(p); }
  drawGemini();
  for(const s of shards) drawShard(s);
  drawBoss();
  drawPlayer();
  drawParts();
  drawHUD();
  ctx.restore();

  if(state==='title'){
    drawCenter([
      {t:'CLAUDE BOT ROCK', y:108, size:19, col:'#d97757'},
      {t:'LEVEL 2', y:140, size:11, col:'#ffcf5a'},
      {t:'THE GEMINI DROP', y:160, size:9, col:'#9fc6ff'},
      {t:'FALL IN. RIDE THE SLIDERS.', y:204, size:8, col:'#f4f1e4'},
      {t:'DODGE THE SLAM. GRAB THE GEMINI.', y:220, size:7, col:'#f4f1e4'},
      {t:(Math.floor(gt/30)%2?'> PRESS ANY KEY / TAP <':'  PRESS ANY KEY / TAP  '),
        y:272, size:9, col:'#ffcf5a'},
    ]);
  } else if(state==='win'){
    drawCenter([
      {t:'LEVEL 2 CLEAR', y:128, size:18, col:'#9fc6ff'},
      {t:'GEMINI SECURED', y:158, size:8, col:'#bfe0ff'},
      {t:'BOOPS TAKEN  '+boops, y:188, size:9, col:'#ff5a4a'},
      {t:(Math.floor(gt/30)%2?'> TAP TO PLAY AGAIN <':'  TAP TO PLAY AGAIN  '),
        y:240, size:8, col:'#f4f1e4'},
    ]);
  }
}

/* ---------- LOOP ---------- */
let last=performance.now(), acc=0;
const STEP_MS=1000/60;
function frame(now){
  acc+=Math.min(now-last,120); last=now;
  while(acc>=STEP_MS){ update(); acc-=STEP_MS; }
  render();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
